name: Apply pending migrations
description: >
  Install deps and apply pending Prisma migrations. In check mode the Turbo task
  result is cached (safe verification against a disposable DB); otherwise the task
  is forced so it always runs against the target database.

inputs:
  check:
    description: When true, only verify migration safety and allow Turbo to cache the result; when false, force a real deploy.
    required: false
    default: "false"
  database-url:
    description: Connection string for the target migration database.
    required: true
  package:
    description: Workspace package that owns the migration task.
    required: false
    default: sql
  task:
    description: Turbo task that applies the migrations.
    required: false
    default: migrate:deploy

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install

    - name: Apply migrations
      shell: bash
      env:
        DATABASE_URL: ${{ inputs.database-url }}
      run: bun turbo -F ${{ inputs.package }} ${{ inputs.task }} ${{ inputs.check == 'true' && '' || '--force' }}

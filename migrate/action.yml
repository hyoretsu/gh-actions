name: Apply pending migrations
description: Install deps and apply pending Prisma migrations. Runs via Turbo when turbo.json exists, otherwise `bun run --filter`. With Turbo, check mode caches the task result (safe verification against a disposable DB) while a real deploy is forced so it always runs against the target database.

inputs:
  check:
    description: When true, only verify migration safety and allow Turbo to cache the result; when false, force a real deploy.
    required: false
    default: "false"
  database-url:
    description: Connection string for the target migration database.
    required: true
  package:
    description: Workspace package that owns the migration task.
    required: false
    default: sql
  task:
    description: Turbo task that applies the migrations.
    required: false
    default: migrate:deploy

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install

    - name: Apply migrations
      shell: bash
      env:
        DATABASE_URL: ${{ inputs.database-url }}
        PKG: ${{ inputs.package }}
        TASK: ${{ inputs.task }}
        FORCE: ${{ inputs.check == 'true' && '' || '--force' }}
      run: |
        if [ -f turbo.json ]; then
          bun turbo -F "$PKG" "$TASK" $FORCE
        else
          bun run --filter "$PKG" "$TASK"
        fi

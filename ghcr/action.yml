name: Build and publish a container image to GHCR
description: Set up Buildx, generate image metadata/tags, log in to a registry and build + push a Docker image with GitHub Actions layer caching. Defaults target GHCR. The repo must already be checked out before this runs.

inputs:
  build-args:
    description: Newline-separated build args passed to the build.
  cache-scope:
    description: Scope key for the GitHub Actions build cache (use a per-image value). Defaults to the last path segment of `image` (e.g. `betai` for `ghcr.io/jbmidia/betai`).
  context:
    description: Build context.
    default: .
  dockerfile:
    description: Path to the Dockerfile.
    default: Dockerfile
  image:
    description: Fully-qualified image name without a tag (e.g. ghcr.io/owner/repo_backend).
    required: true
  password:
    description: Registry password or token (GHCR uses the workflow GITHUB_TOKEN).
    required: true
  push:
    description: Whether to push the built image.
    default: "true"
  registry:
    description: >
      Container registry to log in to and push to. Possible values are:
      - `ghcr.io` (GitHub Container Registry)
    required: true
    # Legacy default
    default: ghcr.io
  secrets:
    description: Newline-separated build secrets passed to the build (e.g. DATABASE_URL=...).
  username:
    description: Registry username.
    default: ${{ github.actor }}

runs:
  using: composite
  steps:
    - name: Resolve cache scope
      id: cache-scope
      shell: bash
      run: echo "value=${CACHE_SCOPE:-${IMAGE##*/}}" >> "$GITHUB_OUTPUT"
      env:
        CACHE_SCOPE: ${{ inputs.cache-scope }}
        IMAGE: ${{ inputs.image }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=sha,prefix=sha-,format=short
          type=raw,value={{date 'YYYYMMDD-HHmmss'}}
          type=raw,value={{date 'YYYYMMDD'}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}

    - name: Log in to the registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        secrets: ${{ inputs.secrets }}
        cache-from: type=gha,scope=${{ steps.cache-scope.outputs.value }}
        cache-to: type=gha,mode=max,scope=${{ steps.cache-scope.outputs.value }}

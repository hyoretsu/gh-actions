name: Build and publish a container image to GHCR
description: >
  Set up Buildx, generate image metadata/tags, log in to a registry and build +
  push a Docker image with GitHub Actions layer caching. Defaults target GHCR.
  The repo must already be checked out before this runs.

inputs:
  image:
    description: Fully-qualified image name without a tag (e.g. ghcr.io/owner/repo_backend).
    required: true
  dockerfile:
    description: Path to the Dockerfile.
    required: true
  context:
    description: Build context.
    required: false
    default: .
  build-args:
    description: Newline-separated build args passed to the build.
    required: false
  secrets:
    description: Newline-separated build secrets passed to the build (e.g. DATABASE_URL=...).
    required: false
  cache-scope:
    description: Scope key for the GitHub Actions build cache (use a per-image value).
    required: true
  registry:
    description: Container registry to log in to and push to.
    required: false
    default: ghcr.io
  username:
    description: Registry username.
    required: false
    default: ${{ github.actor }}
  password:
    description: Registry password or token (GHCR uses the workflow GITHUB_TOKEN).
    required: true
  push:
    description: Whether to push the built image.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image }}
        tags: |
          type=sha,prefix=sha-,format=short
          type=raw,value={{date 'YYYYMMDD'}}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Log in to the registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        secrets: ${{ inputs.secrets }}
        cache-from: type=gha,scope=${{ inputs.cache-scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}

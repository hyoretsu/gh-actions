name: Deploy an Android app to Google Play
description: "Upload a release AAB to Google Play on the chosen track via r0adkll/upload-google-play. One store target among potentially several — pair with android-build (which produces the AAB) and add sibling *-deploy actions for other stores."

inputs:
  service-account-json:
    description: Plain-text Google Play service account JSON key.
    required: true
  package-name:
    description: Android applicationId (must match gen/android/app/build.gradle.kts).
    required: true
  aab:
    description: Path/glob to the release AAB(s) to upload (from android-build's aab-glob).
    required: true
  track:
    description: Play track to release on (production, beta, alpha, internal).
    required: false
    default: production
  status:
    description: Release status (completed, draft, inProgress, halted).
    required: false
    default: completed

runs:
  using: composite
  steps:
    - name: Upload AAB to Google Play
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ inputs.service-account-json }}
        packageName: ${{ inputs.package-name }}
        releaseFiles: ${{ inputs.aab }}
        track: ${{ inputs.track }}
        status: ${{ inputs.status }}

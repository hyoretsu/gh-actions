name: Detect affected packages
description: "Install deps and resolve which workspace packages are affected by the PR diff for the given task(s). Emits a JSON object keyed by task (e.g. {\"test:unit\":[\"backend\"]}) for a downstream matrix; a task no package declares as a script yields an empty list, so its matrix job is skipped. By default uses a built-in, Turbo-free resolver (workspaces from package.json + git diff + per-package script presence); point `script` at a custom resolver to override. The repo must already be checked out (fetch-depth: 0) before this runs, since the base commit must be present to diff against."

inputs:
  tasks:
    description: Space-separated task (script) names to evaluate (e.g. "test:unit test:e2e").
    required: true
  base-sha:
    description: Base commit to diff against. Leave empty (or pass an all-zero SHA) to plan every package — e.g. a push workflow_dispatch or a branch's first push.
    required: false
  script:
    description: Optional path (in the consumer repo) to a custom affected-packages resolver run with Bun, invoked as `bun <script> <base-sha> <tasks...>`. When the file is absent the action falls back to a built-in, Turbo-free resolver that reads workspaces from package.json, diffs against base-sha, and keeps only packages that declare each task as a script.
    required: false
    default: scripts/affected-packages.ts

outputs:
  tasks:
    description: JSON object keyed by task — the affected package names per task.
    value: ${{ steps.affected.outputs.tasks }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install

    - name: Compute affected packages
      id: affected
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        TASKS: ${{ inputs.tasks }}
        SCRIPT: ${{ inputs.script }}
      run: |
        if [ -n "$SCRIPT" ] && [ -f "$SCRIPT" ]; then
          tasks=$(bun "$SCRIPT" "$BASE_SHA" $TASKS)
        else
          tasks=$(bun "$GITHUB_ACTION_PATH/affected.ts")
        fi
        echo "tasks=$tasks" >> "$GITHUB_OUTPUT"

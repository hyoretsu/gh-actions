name: Detect affected packages
description: >
  Install deps and resolve, via Turbo's dependency graph, which workspace
  packages are affected by the PR diff for the given task(s). Emits a JSON
  object keyed by task (e.g. {"test:unit":["backend"]}) for a downstream matrix.
  The repo must already be checked out (fetch-depth: 0) before this runs, since
  it is a local action and Turbo's --affected needs the base commit present.

inputs:
  tasks:
    description: Space-separated Turbo task names to evaluate (e.g. "test:unit test:e2e").
    required: true
  base-sha:
    description: >
      Base commit to diff against. Leave empty (or pass an all-zero SHA) to plan
      every package — e.g. a push workflow_dispatch or a branch's first push.
    required: false
  script:
    description: Path (in the consumer repo) to the affected-packages resolver run with Bun.
    required: false
    default: scripts/affected-packages.ts

outputs:
  tasks:
    description: JSON object keyed by task — the affected package names per task.
    value: ${{ steps.affected.outputs.tasks }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install

    - name: Compute affected packages
      id: affected
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        TASKS: ${{ inputs.tasks }}
        SCRIPT: ${{ inputs.script }}
      run: |
        tasks=$(bun "$SCRIPT" "$BASE_SHA" $TASKS)
        echo "tasks=$tasks" >> "$GITHUB_OUTPUT"
